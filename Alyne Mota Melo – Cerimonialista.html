    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a0f;
      --surface: #111118;
      --border: rgba(255,255,255,0.07);
      --accent: #c8f041;
      --text: #f0f0f5;
      --muted: #6b6b80;
    }

    html, body {
      min-height: 100vh;
      background: var(--bg);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'DM Sans', sans-serif;
      color: var(--text);
      padding: 24px 16px;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 60% 40% at 80% 10%, rgba(200,240,65,0.07) 0%, transparent 60%),
        radial-gradient(ellipse 50% 50% at 10% 90%, rgba(65,240,200,0.06) 0%, transparent 60%);
      pointer-events: none;
      z-index: 0;
    }

    .card {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 400px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 28px;
      padding: 40px 32px 36px;
      box-shadow:
        0 0 0 1px rgba(255,255,255,0.03),
        0 32px 80px rgba(0,0,0,0.6),
        0 0 120px rgba(200,240,65,0.04);
      animation: fadeUp 0.7s cubic-bezier(.22,1,.36,1) both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(30px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .header {
      display: flex;
      align-items: center;
      gap: 20px;
      margin-bottom: 28px;
    }

    .avatar-wrap { position: relative; flex-shrink: 0; }

    .avatar-placeholder {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      background: linear-gradient(135deg, #1e1e2e, #2a2a3a);
      border: 2px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .avatar-placeholder svg { opacity: 0.3; }

    .avatar-badge {
      position: absolute;
      bottom: 2px; right: 2px;
      width: 16px; height: 16px;
      background: var(--accent);
      border-radius: 50%;
      border: 2px solid var(--surface);
    }

    .identity { flex: 1; min-width: 0; }

    .name {
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: 1.35rem;
      line-height: 1.15;
      letter-spacing: -0.02em;
      color: var(--text);
    }
    .name span { color: var(--accent); }

    .role {
      margin-top: 5px;
      font-size: 0.78rem;
      font-weight: 400;
      color: var(--muted);
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }

    .divider {
      height: 1px;
      background: var(--border);
      margin-bottom: 24px;
    }

    .links { display: flex; flex-direction: column; gap: 10px; }

    .link-btn {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 13px 16px;
      border-radius: 14px;
      border: 1px solid var(--border);
      background: rgba(255,255,255,0.02);
      color: var(--text);
      text-decoration: none;
      font-size: 0.9rem;
      font-weight: 500;
      transition: background 0.2s, border-color 0.2s, transform 0.15s;
      cursor: pointer;
    }
    .link-btn:hover {
      background: rgba(255,255,255,0.05);
      border-color: rgba(255,255,255,0.14);
      transform: translateX(3px);
    }
    .link-btn.accent {
      border-color: rgba(200,240,65,0.25);
      background: rgba(200,240,65,0.05);
    }
    .link-btn.accent:hover { background: rgba(200,240,65,0.1); }

    .link-btn.google {
      border-color: rgba(251,188,4,0.3);
      background: rgba(251,188,4,0.05);
    }
    .link-btn.google:hover { background: rgba(251,188,4,0.1); }

    .icon-wrap {
      width: 36px; height: 36px;
      border-radius: 10px;
      background: rgba(255,255,255,0.05);
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .link-btn.accent .icon-wrap { background: rgba(200,240,65,0.12); }
    .link-btn.google .icon-wrap { background: rgba(251,188,4,0.12); }
    .icon-wrap svg { width: 18px; height: 18px; }

    .link-label { flex: 1; }
    .link-label strong { display: block; font-size: 0.88rem; }
    .link-label span { font-size: 0.75rem; color: var(--muted); font-weight: 400; }

    .arrow { color: var(--muted); font-size: 1rem; }

    .save-btn {

      text-align: center;

    }
    .save-btn:hover { opacity: 0.88; transform: scale(0.99); }

    .footer {
      margin-top: 24px;
      text-align: center;
      font-size: 0.7rem;
      color: var(--muted);
      letter-spacing: 0.05em;
    }
  </style>
